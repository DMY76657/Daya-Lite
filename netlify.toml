# Netlify configuration for the Daya Lite Next.js web app.
# The Expo mobile app is not deployed here; it connects to the URL this
# deployment produces (see apps/mobile/.env -> EXPO_PUBLIC_API_BASE_URL).

[build]
  # Build from the repo root (npm workspaces install both apps from here).
  # Netlify's initial Expo auto-detection had set this to apps/mobile — explicit
  # value here overrides any UI-set base directory.
  base = "/"
  command = "npm run build:web"
  publish = "apps/web/.next"

[build.environment]
  NODE_VERSION = "20"
  # The repo's .npmrc already sets legacy-peer-deps for the Expo workspace,
  # but Netlify's CI sometimes needs it as an env var too.
  NPM_FLAGS = "--legacy-peer-deps"
  # Tell Next.js it is the active workspace (monorepo signal).
  NEXT_TELEMETRY_DISABLED = "1"

# Netlify auto-detects Next.js and loads its managed Next.js Runtime; do not
# pin @netlify/plugin-nextjs in netlify.toml — that pins an old npm copy and
# the build log explicitly warns to use the directory plugin instead.
